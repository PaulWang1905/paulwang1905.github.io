<style>
    /* ===== Metro (Modern UI) footer ===== */
    .metro-footer {
        font-family: "Segoe UI", system-ui, -apple-system, "Helvetica Neue", Arial, sans-serif;
    }

    .metro-grid {
        display: grid;
        grid-template-columns: 1fr;
        gap: 0.6rem;
    }
    @media (min-width: 768px) {
        .metro-grid { grid-template-columns: 1fr 1.7fr; align-items: stretch; }
    }

    /* right column stacks the quote tile over the three nav tiles */
    .metro-right { display: flex; flex-direction: column; gap: 0.6rem; height: 100%; }
    .metro-nav { display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.6rem; }

    /* --- base tile --- */
    .mtile {
        position: relative;
        overflow: hidden;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        padding: 0.9rem 1.1rem;
        border-radius: 0;                 /* Metro = sharp corners */
        text-decoration: none;
        transition: filter 0.15s ease, transform 0.1s ease;
    }
    .mtile:hover { filter: brightness(1.08); }
    a.mtile:active { transform: scale(0.97); }        /* Metro press */

    /* --- tile colours, straight from the DaisyUI theme palette --- */
    .mtile--p { background: oklch(var(--p)); color: oklch(var(--pc)); }
    .mtile--s { background: oklch(var(--s)); color: oklch(var(--sc)); }
    .mtile--a { background: oklch(var(--a)); color: oklch(var(--ac)); }
    .mtile--n { background: oklch(var(--b3)); color: oklch(var(--bc)); }

    /* --- tile content --- */
    .mtile__icon { line-height: 0; }
    .mtile__icon svg { width: 24px; height: 24px; }
    .mtile__title { font-weight: 600; font-size: 1rem; }
    .mtile__sub   { font-size: 0.74rem; opacity: 0.85; margin-top: 0.15rem; }
    .mtile__label {
        font-size: 0.6rem;
        font-weight: 700;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        opacity: 0.78;
    }

    /* --- profile tile --- */
    .metro-profile { min-height: 13rem; }
    .metro-avatar {
        width: 3.75rem;
        height: 3.75rem;
        object-fit: cover;
        border-radius: 0;                 /* square, true to Metro */
    }
    .metro-name { font-size: 1.4rem; font-weight: 700; line-height: 1.15; }
    .metro-socials { display: flex; gap: 0.9rem; }
    .metro-socials a { line-height: 0; opacity: 0.85; transition: opacity 0.15s ease, transform 0.15s ease; }
    .metro-socials a:hover { opacity: 1; transform: translateY(-2px); }
    .metro-socials svg { width: 20px; height: 20px; }

    /* --- nav tiles --- */
    .metro-nav .mtile { min-height: 5rem; }

    /* --- quote live tile: Windows 8 face flip --- */
    .metro-quote-tile {
        position: relative;
        flex: 1 1 auto;
        min-height: 7rem;
        overflow: hidden;
        background: oklch(var(--b3));      /* theme-matching backing, seen edge-on mid-flip */
        perspective: 900px;
    }
    .metro-face {
        position: absolute;
        inset: 0;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        padding: 0.9rem 1.1rem;
        transform-origin: center center;
        backface-visibility: hidden;
        will-change: transform;
    }
    .metro-quote-tile:hover .metro-face { filter: brightness(1.08); }
    .metro-face.c0 { background: oklch(var(--p)); color: oklch(var(--pc)); }
    .metro-face.c1 { background: oklch(var(--s)); color: oklch(var(--sc)); }
    .metro-face.c2 { background: oklch(var(--a)); color: oklch(var(--ac)); }

    /* the flap tumbles forward: old face rotates up & away, new face drops in */
    .metro-face.flip-out { animation: metroFlipOut 0.32s ease-in forwards; }
    .metro-face.flip-in  { animation: metroFlipIn 0.5s cubic-bezier(0.2, 0.75, 0.2, 1) forwards; }
    @keyframes metroFlipOut {
        from { transform: rotateX(0deg); }
        to   { transform: rotateX(90deg); }
    }
    @keyframes metroFlipIn {
        from { transform: rotateX(-90deg); }
        to   { transform: rotateX(0deg); }
    }

    .metro-phrase { margin: 0; }
    #phrase { display: inline-block; font-weight: 600; font-size: 1.15rem; line-height: 1.3; }

    .metro-mark {
        position: absolute;
        right: 0.4rem;
        bottom: -0.9rem;
        font-family: Georgia, "Times New Roman", serif;
        font-size: 4.25rem;
        line-height: 1;
        font-weight: 700;
        opacity: 0.16;
        pointer-events: none;
    }

    @media (prefers-reduced-motion: reduce) {
        .metro-face.flip-out, .metro-face.flip-in { animation: none; }
        .mtile { transition: none; }
    }

    /* --- bottom bar --- */
    .metro-bottom {
        display: flex;
        flex-direction: column;
        gap: 0.6rem;
        align-items: center;
        justify-content: space-between;
        margin-top: 1.5rem;
        padding-top: 1.25rem;
        border-top: 1px solid oklch(var(--bc) / 0.2);
        font-size: 0.82rem;
        color: oklch(var(--bc) / 0.6);
    }
    @media (min-width: 640px) { .metro-bottom { flex-direction: row; } }

    .metro-links { display: flex; align-items: center; gap: 1.25rem; }
    .metro-links a {
        text-transform: uppercase;
        letter-spacing: 0.08em;
        font-size: 0.7rem;
        font-weight: 700;
        color: oklch(var(--bc) / 0.7);
        transition: color 0.2s ease;
    }
    .metro-links a:hover { color: oklch(var(--p)); }
    .metro-toplink { display: inline-flex; align-items: center; gap: 0.35rem; }
</style>

<script>
    (function() {
        // Configuration
        const config = {
            displayTime: 4500,
            fadeTime: 320        // matches the flip-out duration below
        };

        // Phrases (rendered as proper JSON by the build; falls back if empty)
        const phrases = {{ phrases | tojson }} || ['Simplicity is the ultimate sophistication', 'Design is intelligence made visible'];
        let currentIndex = 0;
        let colorIndex = 0;

        // Elements
        const phraseElement = document.getElementById('phrase');
        const face = phraseElement ? phraseElement.closest('.metro-face') : null;
        const tileColors = ['c0', 'c1', 'c2'];

        // Repaint the tile face with the next palette colour
        function paintFace() {
            if (!face) return;
            face.classList.remove('c0', 'c1', 'c2');
            face.classList.add(tileColors[colorIndex]);
        }

        // Flip the face out, swap text + colour, then flip the new face in
        function showNextQuote() {
            if (!face) return;
            face.classList.remove('flip-in');
            face.classList.add('flip-out');
            setTimeout(() => {
                currentIndex = (currentIndex + 1) % phrases.length;
                colorIndex = (colorIndex + 1) % tileColors.length;
                phraseElement.textContent = phrases[currentIndex];
                paintFace();
                face.classList.remove('flip-out');
                void face.offsetWidth;            // reflow so flip-in restarts cleanly
                face.classList.add('flip-in');
            }, config.fadeTime);
        }

        // Initialize
        function initialize() {
            // Keep the copyright year current
            const yearEl = document.getElementById('footer-year');
            if (yearEl) yearEl.textContent = new Date().getFullYear();

            if (!phraseElement || !phrases.length) return;

            // Show the first phrase, then rotate (only if there is more than one)
            phraseElement.textContent = phrases[0];
            paintFace();
            if (phrases.length > 1) setInterval(showNextQuote, config.displayTime);
        }

        // Start when document is loaded
        if (document.readyState !== 'loading') {
            initialize();
        } else {
            document.addEventListener('DOMContentLoaded', initialize);
        }
    })();
</script>
